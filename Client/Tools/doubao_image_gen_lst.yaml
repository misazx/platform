defaults:
  model: "doubao-seedream-5-0-260128"
  gen_size: "2K"
  output_format: "png"
  watermark: false
  concurrency: 5
  retry: 3
  style_prefix: ""
  style_suffix: ""

batches:
  - name: "光影旅者-背景图"
    size: "1280x720"
    style: ""
    output_dir: "Client/GameModes/light_shadow_traveler/Resources/Backgrounds"
    resources:
      - filename: "forest_bg.png"
        prompt: "2D横版平台跳跃游戏背景，分辨率1280x720，治愈系手绘剪影风格，低饱和度柔和莫兰迪绿色系色调，支持分层视差滚动，远景为朦胧雾感的高大树木剪影，中景为错落的森林树木层，近景为清晰的低矮灌木、细碎野花野草剪影，柔和漫射光线穿透树冠缝隙洒下，整体光影柔化无硬边，氛围治愈静谧"
        negative: "写实,3D,高饱和,硬边,人物,文字,UI"
      - filename: "studio_bg.png"
        prompt: "治愈系手绘剪影风格，2D横版平台跳跃游戏背景，低饱和度柔和暖色调，画室场景，错落摆放的木质画架、散落的复古画框，地面零散放置半完成画纸、颜料管，暖黄柔和漫射灯光，软边缘无硬阴影，氛围松弛治愈，横版场景层级分明，分辨率1280x720，无冗余突兀元素"
        negative: "写实,3D,高饱和,硬边,人物,文字,UI"
      - filename: "concert_hall_bg.png"
        prompt: "治愈系手绘剪影风格，2D横版平台跳跃游戏背景，1280x720分辨率，低饱和度柔和暖黄色调，空旷静谧的音乐厅场景，画面摆放剪影化钢琴、立式乐谱架，顶部洒落软边缘柔和暖光，无硬阴影，整体氛围松弛治愈，画面分层适配横版游戏场景需求，无冗余杂乱元素"
