defaults:
  model: "doubao-seedream-5-0-260128"
  gen_size: "2K"
  output_format: "png"
  watermark: false
  concurrency: 5
  retry: 3
  style_prefix: ""
  style_suffix: ""

batches:
  - name: "背景图"
    size: "1920x1080"
    style: "暗黑奇幻风格游戏场景背景，杀戮尖塔风格，暗色调，氛围感强，"
    output_dir: "Client/GameModes/base_game/Resources/Images/Backgrounds"
    resources:
      - filename: "overgrowth.png"
        prompt: "杂草丛生的废墟走廊，藤蔓覆盖的石墙，暗绿色调，微弱光线从裂缝透入，阴森神秘的地牢入口"
        negative: "明亮,卡通,现代,人物,文字"
      - filename: "hive.png"
        prompt: "蜂巢状地下洞穴，暗红琥珀色墙壁，蜂巢纹理，粘稠液体滴落，诡异生物巢穴，恐怖氛围"
        negative: "明亮,卡通,现代,人物,文字"
      - filename: "glory.png"
        prompt: "辉煌的尖塔顶端，金色光芒穿透云层，庄严神圣的殿堂，胜利的光辉，壮丽史诗感"
        negative: "阴暗,恐怖,卡通,现代,人物,文字"
      - filename: "underdocks.png"
        prompt: "地下码头，潮湿木板，昏暗灯笼，雾气弥漫的水面，破旧木船，阴暗潮湿的港口"
        negative: "明亮,卡通,现代,人物,文字"

