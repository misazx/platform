version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roguelike-game-server
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Data Source=/data/roguelike.db
      - Jwt__Issuer=RoguelikeGameServer
      - Jwt__Audience=RoguelikeGameClient
      - Jwt__Key=${JWT_SECRET_KEY:-your_super_secret_jwt_key_here_change_in_production_at_least_32_characters!}
      - Logging__LogLevel__Default=Information
    volumes:
      - db_data:/data
      - logs_data:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
    driver: local
  logs_data:
    driver: local
